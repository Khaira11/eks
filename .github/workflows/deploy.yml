name: "Terraform EKS Deploy"

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  terraform:
    name: "Terraform Action"
    runs-on: ubuntu-latest

    steps:
    # 1. Check out the repository code
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Set up AWS Credentials
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    # 3. Install Terraform on the runner
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    # 4. Initialize Terraform (downloads modules and connects to S3)
    - name: Terraform Init
      run: terraform init

    # 5. Check if the code format is correct
    - name: Terraform Format Check
      run: terraform fmt -check

    # 6. See a preview of what will be created
    - name: Terraform Plan
      run: terraform plan

    # 7. Apply the changes (Deploy the cluster)
    - name: Terraform Apply
      run: terraform apply -auto-approve